services:
  db:
    image: postgres:16
    container_name: peblo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: peblo_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
